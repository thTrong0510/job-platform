{% extends "layouts/admin_base.html" %}
{% block content %}
<style>
    .cv-card { transition: transform 0.2s; border: 1px solid #eee; }
    .cv-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }

    /* Tạo khung tỉ lệ chuẩn A4 cho ảnh preview */
    .img-container {
        width: 100%;
        padding-top: 141%; /* Tỉ lệ A4 (1:1.41) */
        position: relative;
        background-color: #f8f9fa;
        overflow: hidden;
    }
    .img-container img {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: contain; /* Đảm bảo hiển thị toàn bộ ảnh không bị cắt */
        padding: 10px;
    }
</style>

<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">Quản lý CV Templates</h4>
        <a href="{{ url_for('cv_templates.create') }}" class="btn btn-primary rounded-pill px-4">
            <i class="bi bi-plus-lg me-1"></i> Thêm Template mới
        </a>
    </div>

    <div class="row g-4">
        {% for temp in templates %}
        <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="card cv-card h-100 shadow-sm border-0 rounded-3">
                <div class="img-container border-bottom">
                    <img src="{{ temp.preview_image if temp else url_for('static', filename='images/default-avatar.png') }}" alt="Preview">
                </div>
                <div class="card-body p-3">
                    <h6 class="fw-bold mb-1">{{ temp.name }}</h6>
                    <p class="text-muted small mb-3 text-truncate">{{ temp.description }}</p>

                    <div class="d-flex gap-2">
                        <a href="{{ url_for('cv_templates.edit', template_id=temp.id) }}"
                           class="btn btn-sm btn-outline-primary flex-grow-1 rounded-pill">
                            <i class="bi bi-pencil-square me-1"></i> Sửa
                        </a>
                        <form action="{{ url_for('cv_templates.delete', template_id=temp.id) }}"
                              method="POST" class="flex-grow-1" onsubmit="return confirm('Xác nhận xóa mẫu này?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger w-100 rounded-pill">
                                <i class="bi bi-trash me-1"></i> Xóa
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
