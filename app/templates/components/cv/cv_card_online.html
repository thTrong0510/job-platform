<div class="col-md-4 mb-3">
    <div class="card shadow-sm h-100">
        <div class="card-body">
            <h6 class="card-title">{{ cv.title }}</h6>
            <p class="text-muted small mb-2">
                Created at: {{ cv.created_at.strftime('%d/%m/%Y') }}
            </p>

            <div class="d-flex gap-2">
                <a href="{{ url_for('candidate.view_cv', cv_id=cv.id) }}"
                   class="btn btn-sm btn-outline-secondary">
                    View
                </a>

                <a href="{{ url_for('candidate.edit_cv', cv_id=cv.id) }}"
                   class="btn btn-sm btn-outline-warning">
                    Update
                </a>

                <form action="{{ url_for('candidate.delete_cv', cv_id=cv.id) }}"
                      method="POST"
                      style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        Delete
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
