[pytest]
# Thư mục chứa test
testpaths = tests

# Thêm thư mục gốc project vào PYTHONPATH
# Dấu . nghĩa là thư mục hiện tại (nơi chạy pytest = project root)
# → Python sẽ tìm được "app", "config", v.v.
pythonpath = .

# Hiện output đầy đủ
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings